<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELTE RAG Assistant Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <h1>ELTE RAG Assistant Extension</h1>
      <p class="subtitle">Configure the backend API endpoint used by the chat widget.</p>

      <form id="api-settings-form" class="form">
        <label for="api-base-url">API base URL</label>
        <input id="api-base-url" type="url" placeholder="http://localhost:8001" required />
        <div class="actions">
          <button type="submit">Save</button>
          <button type="button" id="reset-default" class="secondary">Use default</button>
        </div>
      </form>

      <p id="status" data-variant="success" role="status" aria-live="polite"></p>
    </main>

    <script src="./options.js"></script>
  </body>
</html>
